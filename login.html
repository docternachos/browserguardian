<!DOCTYPE html>
<html>
<head>
    <title>Login - BrowserGuardian</title>

    <style>
        body{
            background:#111;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:#1b1b1b;
            padding:40px;
            border-radius:20px;
            width:350px;
            text-align:center;
        }

        h1{
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            background:#2a2a2a;
            color:white;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#ff6b00;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        .google{
            margin-top:10px;
            background:#333;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>BrowserGuardian</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <button class="google" onclick="googleLogin()">
        Sign in with Google
    </button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
    getAuth,
    signInWithPopup,
    GoogleAuthProvider,
    signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOixYPnsgWobRhmxibgdjjRPtz1ILEMjs",
  authDomain: "browserguardian-c2ac8.firebaseapp.com",
  projectId: "browserguardian-c2ac8",
  storageBucket: "browserguardian-c2ac8.firebasestorage.app",
  messagingSenderId: "361303818022",
  appId: "1:361303818022:web:aab475c9f7faeefd674be7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        location.href = "dashboard.html";

    }catch(err){
        alert(err.message);
    }
}

window.googleLogin = async function(){

    try{

        const provider =
            new GoogleAuthProvider();

        await signInWithPopup(
            auth,
            provider
        );

        location.href = "dashboard.html";

    }catch(err){
        alert(err.message);
    }
}

</script>

</body>
</html>
